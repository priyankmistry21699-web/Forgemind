# ============================================================
# ForgeMind API — Alembic Configuration
# ============================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new revision files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long revision messages in filenames
truncate_slug_length = 40

# Timezone for revision timestamps (uses UTC)
timezone = UTC

# sys.path prepend — allows "app.*" imports from the api root
prepend_sys_path = .

# sqlalchemy.url is set dynamically in env.py from app.core.config
# sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
